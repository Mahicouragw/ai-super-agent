name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create .env from secrets
        working-directory: flutter_app
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          echo ".env created"
          cat .env

      - name: Ensure Flutter Project Structure
        working-directory: flutter_app
        run: |
          # Save our custom lib and pubspec
          echo "Backing up custom code..."
          mkdir -p /tmp/backup_lib
          cp -r lib /tmp/backup_lib/ || true
          cp pubspec.yaml /tmp/backup_lib/ || true
          
          # If android folder missing, create full Flutter project
          if [ ! -d "android" ]; then
            echo "android folder missing - creating flutter project scaffold..."
            flutter create --platforms=android,web --project-name ai_super_agent .
          fi
          
          # Restore our custom code
          echo "Restoring custom AI Super Agent code..."
          rm -rf lib
          cp -r /tmp/backup_lib/lib ./
          cp /tmp/backup_lib/pubspec.yaml ./pubspec.yaml || true
          ls -la lib/
          cat pubspec.yaml

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze || true

      - name: Build APK (Release)
        working-directory: flutter_app
        run: flutter build apk --release --verbose

      - name: Build APK Split (Fallback)
        if: failure()
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
