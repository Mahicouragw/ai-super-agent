name: Build Flutter APK
permissions:
  contents: write

on:
  push:
    branches: ["main"]
    paths:
      - "flutter_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env from secrets (All Models: Claude Opus/Sonnet, ChatGPT, Groq, Gemini)
        working-directory: flutter_app
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}" >> .env
          echo "CLAUDE_MODEL=${{ secrets.CLAUDE_MODEL }}" >> .env
          echo "CLAUDE_SONNET_MODEL=${{ secrets.CLAUDE_SONNET_MODEL }}" >> .env
          echo "AI_PROVIDER=openrouter" >> .env
          echo ".env created"

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate Android platform files
        working-directory: flutter_app
        run: flutter create --platforms=android .

      - name: Add permissions (Internet, Mic, Location, Storage)
        working-directory: flutter_app
        run: |
          python3 - << 'PY'
          p = 'android/app/src/main/AndroidManifest.xml'
          s = open(p).read()
          perms = '''    <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
          '''
          if 'RECORD_AUDIO' not in s:
              s = s.replace('<application', perms + '    <application', 1)
          open(p,'w').write(s)
          print('Manifest patched with all skills permissions')
          PY

      - name: Build debug APK (All Skills: Claude, GPT, Groq, Gemini, Multi-Agent)
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Give APK friendly name
        working-directory: flutter_app
        run: cp build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/AISuperAgent.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-super-agent-debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/AISuperAgent.apk
          retention-days: 90

      - name: Upload APK as Release (One-Tap)
        if: github.ref == 'refs/heads/main'
        run: python3 .github/scripts/release_apk.py
        working-directory: flutter_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: build/app/outputs/flutter-apk/AISuperAgent.apk
          TAG_BASE: flutter-apk
          RELEASE_NAME: AI Super Agent APK - Claude Opus, GPT-4o, Groq, Gemini, Multi-Agent
