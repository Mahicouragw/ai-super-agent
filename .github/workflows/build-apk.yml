name: Build Flutter APK
permissions:
  contents: write

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env for all models Claude Opus, GPT-4o, Groq, Gemini
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > flutter_app/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> flutter_app/.env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> flutter_app/.env
          echo "OPENROUTER_MODEL=${{ secrets.OPENROUTER_MODEL }}" >> flutter_app/.env
          echo "AI_PROVIDER=openrouter" >> flutter_app/.env
          cat flutter_app/.env | sed 's/KEY=.*/KEY=***hidden***/'

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate Android platform files
        working-directory: flutter_app
        run: flutter create --platforms=android .

      - name: Add internet and mic permissions
        run: |
          MANIFEST=flutter_app/android/app/src/main/AndroidManifest.xml
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
            echo "Permissions added"
          fi
          cat "$MANIFEST" | grep permission

      - name: Build debug APK with all skills
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: Rename APK
        working-directory: flutter_app
        run: cp build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/AISuperAgent.apk && ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-super-agent-debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/AISuperAgent.apk
          retention-days: 90

      - name: Upload as Release One-Tap
        run: python3 .github/scripts/release_apk.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: flutter_app/build/app/outputs/flutter-apk/AISuperAgent.apk
          TAG_BASE: flutter-apk
          RELEASE_NAME: AI Super Agent APK - Claude Opus GPT-4o Groq Gemini Multi-Agent
