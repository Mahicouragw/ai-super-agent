name: ai_super_agent
description: AI Super Agent with Supabase Auth, PDF Search, News, App Builder, Reports - APK Ready - Claude Opus, GPT-4o, Groq, Gemini via OpenRouter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.5.6
  provider: ^6.1.1
  http: ^1.2.0
  file_picker: ^8.1.2
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.2
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.4.0
  flutter_markdown: ^0.7.4
  url_launcher: ^6.2.4
  syncfusion_flutter_pdf: ^25.2.7
  google_fonts: ^6.1.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
